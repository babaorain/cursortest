<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>三款網頁小遊戲</title>
<style>
:root{
  color-scheme:light;
  --ink:#172033;
  --muted:#657084;
  --line:rgba(23,32,51,.12);
  --panel:rgba(255,255,255,.82);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Inter,"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;color:var(--ink);background:linear-gradient(135deg,#bfe9ff 0%,#fff2bf 48%,#d9f8e7 100%)}
body{display:grid;place-items:center;padding:28px}
main{width:min(980px,100%);display:grid;gap:22px}
.hero,.game{background:var(--panel);border:1px solid var(--line);box-shadow:0 24px 70px rgba(55,69,94,.18);backdrop-filter:blur(16px)}
.hero{border-radius:26px;padding:clamp(24px,5vw,46px)}
h1{margin:0;font-size:clamp(34px,7vw,70px);line-height:.98;font-weight:950;letter-spacing:0}
p{margin:12px 0 0;color:var(--muted);font-size:clamp(15px,2vw,18px);line-height:1.65;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.game{position:relative;min-height:230px;border-radius:22px;padding:20px;text-decoration:none;color:inherit;overflow:hidden;display:grid;align-content:end;transition:transform .16s ease,box-shadow .16s ease}
.game:hover{transform:translateY(-4px);box-shadow:0 30px 80px rgba(55,69,94,.24)}
.game::before{content:"";position:absolute;inset:0;opacity:.9}
.game:nth-child(1)::before{background:linear-gradient(160deg,#86c9ff,#f7bd62)}
.game:nth-child(2)::before{background:linear-gradient(160deg,#071426,#1668d8)}
.game:nth-child(3)::before{background:linear-gradient(160deg,#c4f0ff,#ccf5d9)}
.game::after{content:"";position:absolute;right:-24px;top:-24px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.32)}
.content{position:relative;z-index:1;background:rgba(255,255,255,.76);border:1px solid rgba(255,255,255,.6);border-radius:18px;padding:16px}
h2{margin:0;font-size:24px;line-height:1.1;font-weight:950}
.content p{margin-top:8px;font-size:14px;line-height:1.5}
.open{display:inline-flex;margin-top:14px;align-items:center;gap:8px;border-radius:999px;background:#172033;color:white;padding:9px 13px;font-size:13px;font-weight:900}
@media (max-width:760px){
  body{padding:16px}
  .grid{grid-template-columns:1fr}
  .game{min-height:190px}
}
</style>
</head>
<body>
<main>
  <section class="hero">
    <h1>三款網頁小遊戲</h1>
    <p>單檔 HTML、免安裝、手機與桌面都能玩。選一款開始：跑酷、霓虹疾跑，或打地鼠反應賽。</p>
  </section>
  <section class="grid" aria-label="遊戲列表">
    <a class="game" href="./dino-runner.html">
      <div class="content">
        <h2>小恐龍跳跳</h2>
        <p>沙丘跑酷，跳過仙人掌、低身閃避翼龍。</p>
        <span class="open">開啟遊戲</span>
      </div>
    </a>
    <a class="game" href="./blue-speed-hedgehog.html">
      <div class="content">
        <h2>藍速刺蝟</h2>
        <p>雙段跳、集金環、用衝刺撞碎障礙。</p>
        <span class="open">開啟遊戲</span>
      </div>
    </a>
    <a class="game" href="./whack-a-mole.html">
      <div class="content">
        <h2>打地鼠</h2>
        <p>連擊加分、避開炸彈，手機支援震動回饋。</p>
        <span class="open">開啟遊戲</span>
      </div>
    </a>
  </section>
</main>
</body>
</html>
